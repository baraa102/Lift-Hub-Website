<section class="hero">
  <div class="heroGrid">
    <div>
      <h2>Be kind. Be confident. Lift others up.</h2>
      <p class="muted" id="homeTagline">
        A student space for study guides, positive community, and simple collaboration.
      </p>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
        <button class="btn primary" data-open="drawerGuides">📚 Open Study Guides</button>
        <button class="btn" data-open="drawerChat">💬 Open Chat</button>
        <a class="btn" href="#/profile">👤 Profile</a>
      </div>

      <div class="card soft" style="margin-top:14px">
        <h3 style="margin:0 0 8px">Quick actions</h3>
        <div class="row">
          <div class="card soft">
            <div style="font-weight:900;margin-bottom:6px">⭐ Favorites</div>
            <div class="muted" style="font-size:13px">Save guides you use most.</div>
          </div>
          <div class="card soft">
            <div style="font-weight:900;margin-bottom:6px">📌 Pin drawers</div>
            <div class="muted" style="font-size:13px">Freeze Guides/Chat and auto-fit the page.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="heroMedia">
      <img src="./images/hero.jpg"
           alt="Hero"
           onerror="this.outerHTML='<div class=&quot;muted&quot; style=&quot;padding:12px&quot;>Image missing: <code>./images/hero.jpg</code></div>'" />
      <p class="muted" style="margin:10px 0 0"></p>
    </div>
  </div>
</section>

<section class="card" style="margin-top:14px">
  <h3 style="margin:0 0 8px">Photo Gallery</h3>
  <p class="muted" style="margin:0 0 12px"></p>

  <div class="gallery">
    <img src="./images/g1.jpg" alt="g1"
         onerror="this.outerHTML='<div class=&quot;muted&quot; style=&quot;padding:10px&quot;>Missing: <code>./images/g1.jpg</code></div>'">
    <img src="./images/g2.jpg" alt="g2"
         onerror="this.outerHTML='<div class=&quot;muted&quot; style=&quot;padding:10px&quot;>Missing: <code>./images/g2.jpg</code></div>'">
    <img src="./images/g3.jpg" alt="g3"
         onerror="this.outerHTML='<div class=&quot;muted&quot; style=&quot;padding:10px&quot;>Missing: <code>./images/g3.jpg</code></div>'">
    <img src="./images/g4.jpg" alt="g4"
         onerror="this.outerHTML='<div class=&quot;muted&quot; style=&quot;padding:10px&quot;>Missing: <code>./images/g4.jpg</code></div>'">
  </div>
</section>
